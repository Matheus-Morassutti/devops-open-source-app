<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DevOps Open Source App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1f2937;
      padding: 40px;
      border-radius: 16px;
      max-width: 720px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    h1 { color: #38bdf8; }
    li { margin: 10px 0; }
    .ok { color: #22c55e; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DevOps Open Source App</h1>
    <p class="ok">Sistema operando em nuvem pública AWS EC2 com Docker.</p>
    <p>Projeto acadêmico demonstrando práticas de DevOps:</p>
    <ul>
      <li>Versionamento com GitHub</li>
      <li>Containerização com Docker</li>
      <li>Deploy em nuvem pública AWS</li>
      <li>Pipeline CI/CD com GitHub Actions</li>
      <li>Publicação via servidor web Nginx</li>
    </ul>
  </div>
</body>
</html>
